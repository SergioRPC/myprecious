<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Boas-vindas</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f0f0f,#4b0082);
  color: white;
  text-align: center;
  padding: 40px;
}

.box {
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 15px;
  max-width: 500px;
  margin: auto;
}

a {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 20px;
  background: linear-gradient(45deg, purple, violet);
  color: white;
  text-decoration: none;
  border-radius: 10px;
}
</style>

</head>
<body>

<div class="box" id="conteudo"></div>

<script>
const params = new URLSearchParams(window.location.search);
const nome = params.get("nome");
const codigo = params.get("codigo");

document.getElementById("conteudo").innerHTML = `
💜 <h2>Bem-vindo(a), ${nome}!</h2>

<p>Estamos muito honrados em tê-lo(a) como padrinho ❤️</p>

<p><b>Sua senha é ${codigo}</b></p>

<p>🎁 Deixamos algumas sugestões, aproveite</p>

<a href="https://sergiorpc.github.io/myprecious/">➡️ Acessar lista</a>
`;
</script>

</body>
</html>
