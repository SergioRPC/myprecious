<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🎁 Lista de Casamento</title>

<style>

/* ===== ESTILO GERAL ===== */
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #4b0082);
  color: white;
  margin: 0;
}

/* ===== BLOQUEIO ===== */
#bloqueio {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #000, #4b0082);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* ANIMAÇÃO */
.fade {
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1; transform: scale(1);}
}

/* INPUT */
input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin: 10px;
  text-align: center;
}

/* BOTÃO */
button {
  background: linear-gradient(45deg, purple, violet);
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* WHATS */
.whats {
  color: #25D366;
  margin-top: 15px;
  text-decoration: none;
  font-weight: bold;
}

/* ===== CONTEÚDO ===== */
#conteudo {
  display: none;
  padding: 20px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
}

/* ITEM */
.item {
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
}

/* IMAGEM */
.produto {
  width: 120px;
  height: 120px;
  object-fit: cover;
  transition: 0.4s;
  cursor: pointer;
}

.produto:hover {
  transform: scale(2.5);
}

/* TEXTO */
.info {
  text-align: left;
}

/* BOTÃO COMPRADO */
.comprado {
  background: green !important;
}

/* ===== CURSOR ANIMADO ===== */
#cursor {
  position: fixed;
  width: 40px;
  pointer-events: none;
  z-index: 999;
  display: none;
}

</style>
</head>

<body>

<!-- 🔒 LOGIN -->
<div id="bloqueio" class="fade">

  <h1>🔒 Acesso à Lista</h1>
  <p>Solicite seu código no WhatsApp</p>

  <input id="codigo" placeholder="Digite seu código">

  <button onclick="validar()">Entrar</button>

  <a class="whats"
     href="https://wa.me/5511989163463?text=Olá,%20quero%20o%20código%20da%20lista%20de%20casamento"
     target="_blank">
     📲 Pedir código no WhatsApp
  </a>

</div>

<!-- 🛍️ SITE -->
<div id="conteudo">

  <h1>🎁 Lista de Casamento</h1>

  <div class="container">

    <!-- GELADEIRA -->
    <div class="item">
      <img src="GELADEIRA/GELADEIRINHA.gif" class="produto">

      <div class="info">
        <strong>Geladeira Duplex Inox</strong><br><br>

        <a href="https://www.magazineluiza.com.br/" target="_blank">Ver produto</a><br><br>

        <button onclick="marcar(this)">Disponível</button>
      </div>
    </div>

    <!-- TV -->
    <div class="item">
      <img src="Smart TV 50/Smart TV 50.gif" class="produto">

      <div class="info">
        <strong>Smart TV 50"</strong><br><br>

        <a href="https://www.amazon.com.br/" target="_blank">Ver produto</a><br><br>

        <button onclick="marcar(this)">Disponível</button>
      </div>
    </div>

  </div>

</div>

<!-- 🎯 CURSOR ANIMADO -->
<img src="Mouse/Aliancas move.gif" id="cursor">

<script>

/* ===== CÓDIGOS ===== */
const codigos = {
  "TESTE": "1234",
  "ADREIL/SORIANE": "2010",
  "carlos": "9999"
};

/* ===== LOGIN ===== */
function validar() {
  let input = document.getElementById("codigo").value.trim();
  let autorizado = false;

  for (let pessoa in codigos) {
    if (codigos[pessoa] === input) {
      autorizado = true;
      break;
    }
  }

  if (autorizado) {
    document.getElementById("bloqueio").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  } else {
    alert("Código inválido!");
  }
}

/* ===== BOTÃO ===== */
function marcar(btn) {
  if (btn.innerText === "Disponível") {
    btn.innerText = "Comprado";
    btn.classList.add("comprado");
  } else {
    btn.innerText = "Disponível";
    btn.classList.remove("comprado");
  }
}

/* ===== CURSOR SEGUINDO O MOUSE ===== */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.pageX + "px";
  cursor.style.top = e.pageY + "px";
});

/* MOSTRAR SÓ EM ELEMENTOS CLICÁVEIS */
document.querySelectorAll("a, button, img").forEach(el => {

  el.addEventListener("mouseenter", () => {
    cursor.style.display = "block";
  });

  el.addEventListener("mouseleave", () => {
    cursor.style.display = "none";
  });

});

</script>

</body>
</html>
